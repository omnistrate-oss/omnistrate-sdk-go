    FleetNebiusAccountBindingResult:
      description: A safe Nebius tenant binding representation without private key
        material
      example:
        derivedPublicKeyFingerprint: SHA256:derived-public-key-fingerprint
        keyExpiresAt: 2026-04-15T12:00:00Z
        keyFingerprint: SHA256:live-key-fingerprint
        keyState: ACTIVE
        ownsArtifactBucket: true
        projectID: project-e00b497fpr00n5hg8wbh2d
        publicKeyID: publickey-e00ngem85mc6pr5v63
        publicKeyIDMatches: true
        region: eu-north1
        serviceAccountID: serviceaccount-e00vqdp9fskhmmaan8
        serviceAccountKeyValidated: true
        status: READY
        statusMessage: Binding is ready
      properties:
        derivedPublicKeyFingerprint:
          description: The fingerprint derived locally from the configured Nebius
            private key's public key for this binding
          example: SHA256:derived-public-key-fingerprint
          type: string
        keyExpiresAt:
          description: When the live Nebius auth public key expires for this binding
          example: 2026-04-15T12:00:00Z
          format: date-time
          type: string
        keyFingerprint:
          description: The Nebius fingerprint reported by the live auth public key
            during verification for this binding
          example: SHA256:live-key-fingerprint
          type: string
        keyState:
          description: The live Nebius auth public key state returned during verification
            for this binding
          example: ACTIVE
          type: string
        ownsArtifactBucket:
          description: Whether this binding owns the Nebius artifact bucket for the
            account config
          example: true
          type: boolean
        projectID:
          description: The Nebius project ID for this binding
          example: project-e00b497fpr00n5hg8wbh2d
          type: string
        publicKeyID:
          description: The Nebius public key ID for this binding
          example: publickey-e00ngem85mc6pr5v63
          type: string
        publicKeyIDMatches:
          description: Whether the configured Nebius public key ID resolves to a live
            auth public key whose key material matches the configured private key
            for this binding
          example: true
          type: boolean
        region:
          description: The Nebius region served by this binding
          example: eu-north1
          type: string
        serviceAccountID:
          description: The Nebius service account ID for this binding
          example: serviceaccount-e00vqdp9fskhmmaan8
          type: string
        serviceAccountKeyValidated:
          description: Whether the live Nebius auth public key belongs to the configured
            Nebius service account for this binding
          example: true
          type: boolean
        status:
          description: The status of the account configuration
          example: PENDING|VERIFYING|READY|FAILED|DELETING|READY_TO_OFFBOARD
          type: string
        statusMessage:
          description: The status message of this binding
          example: Binding is ready
          type: string
      type: object
