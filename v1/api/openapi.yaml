          example: 0 2 * * *
          pattern: "^(\\*|[0-5]?\\d)(\\s+(\\*|[0-1]?\\d|2[0-3]))(\\s+(\\*|[1-2]?\\\
            d|3[01]))(\\s+(\\*|[1-9]|1[0-2]))(\\s+(\\*|[0-6]))$"
