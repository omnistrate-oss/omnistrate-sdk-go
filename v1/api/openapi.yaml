    APIKeyMetadata:
      example:
        createdAt: 2026-04-23T19:37:16Z
        createdByUserId: user-12345678
        createdByUserName: Alice Admin
        description: Used by the prod CI pipeline to call the deploy API.
        expiresAt: 2027-01-01T00:00:00Z
        id: apikey-12345678
        lastUsedAt: 2026-04-23T19:37:16Z
        name: ci-pipeline-prod
        prefix: om
        revokedAt: 2026-04-30T12:00:00Z
        revokedByUserId: user-87654321
        revokedByUserName: Bob Ops
        roleType: admin
        status: active
      properties:
        createdAt:
          description: Creation timestamp.
          example: 2026-04-23T19:37:16Z
          format: date-time
          type: string
        createdByUserId:
          description: ID of a User
          example: Officia cum blanditiis doloribus blanditiis excepturi ipsam.
          type: string
        createdByUserName:
          description: Display name of the user that created the key. Null if the
            creating user has been hard-deleted.
          example: Alice Admin
          type: string
        description:
          description: Optional free-text description. Editable via Update metadata.
          example: Used by the prod CI pipeline to call the deploy API.
          type: string
        expiresAt:
          description: Optional expiry. Null for non-expiring keys.
          example: 2027-01-01T00:00:00Z
          format: date-time
          type: string
        id:
          description: ID of an API Key
          example: apikey-12345678
          type: string
        lastUsedAt:
          description: Timestamp of the most recent successful authentication. Null
            when the key has never been used. System-managed; updated monotonically
            (never moves backwards).
          example: 2026-04-23T19:37:16Z
          format: date-time
          type: string
        name:
          description: Operator-facing display name. Unique within the org. Editable
            via Update metadata.
          example: ci-pipeline-prod
          type: string
        prefix:
          description: The fixed prefix label embedded in the plaintext at creation
            time. The only characters of the plaintext that are ever stored or returned
            after creation. Immutable.
          example: om
          type: string
        revokedAt:
          description: Revocation timestamp. Null when the key is not revoked. System-managed;
            set by the Revoke endpoint.
          example: 2026-04-30T12:00:00Z
          format: date-time
          type: string
        revokedByUserId:
          description: ID of a User
          example: Amet mollitia alias.
          type: string
        revokedByUserName:
          description: Display name of the user that revoked the key. Null when the
            key is not revoked or if the revoking user has been hard-deleted.
          example: Bob Ops
          type: string
        roleType:
          description: Type of the role
          example: root|editor|reader|service_editor|service_reader|admin|service_operator
          type: string
        status:
          description: "Derived lifecycle status of the API key, computed from revokedAt\
            \ and expiresAt at read time."
          example: active|expired|revoked
          type: string
      required:
      - createdAt
      - createdByUserId
      - id
      - name
      - prefix
      - roleType
      - status
      type: object
